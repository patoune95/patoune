baseURL = "https://www.patoune-it.fr/"
title = "Patoune-IT"
theme = "PaperMod"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[services]
  [services.googleAnalytics]
    id = "G-K75YTJ0NQR"

[pagination]
  pagerSize = 6

[params]
  author = "Thomas L."
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  defaultTheme = "auto"
  mainSections = ["posts"]
  displayFullLangName = true
  keywords = ["azure", "cloud", "devops", "kubernetes", "terraform", "architecture", "lead tech", "paris"]

[params.schema]
  publisherType = "Person"

[params.label]
  text = "Patoune-IT"
  icon = "/assets/images/patoune_logo_cat.png"
  iconHeight = 32

[params.cover]
  hiddenInList = false
  hiddenInSingle = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/patoune95"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/thomas-l-a365153a/"

[languages]
  [languages.en]
    languageName = "English"
    weight = 2
    [languages.en.params]
      languageFlag = "🇬🇧"
      description = "Technical blog about cloud, DevOps, Azure and Kubernetes — by Thomas L., Lead Tech engineer based in Paris."
      [languages.en.params.homeInfoParams]
        Title = "Patoune-IT"
        Content = "Technical blog · Lead Tech · Paris, France"
    [[languages.en.menus.main]]
      name = "Posts"
      url = "/posts/"
      weight = 1
    [[languages.en.menus.main]]
      name = "Tags"
      url = "/tags/"
      weight = 2
    [[languages.en.menus.main]]
      name = "Archives"
      url = "/archives/"
      weight = 3

  [languages.fr]
    languageName = "Français"
    weight = 1
    [languages.fr.params]
      languageFlag = "🇫🇷"
      description = "Blog technique sur le cloud, DevOps, Azure et Kubernetes — par Thomas L., Lead Tech basé à Paris."
      [languages.fr.params.homeInfoParams]
        Title = "Patoune-IT"
        Content = "Blog technique · Lead Tech · Paris, France"
    [[languages.fr.menus.main]]
      name = "Posts"
      url = "/fr/posts/"
      weight = 1
    [[languages.fr.menus.main]]
      name = "Tags"
      url = "/fr/tags/"
      weight = 2
    [[languages.fr.menus.main]]
      name = "Archives"
      url = "/fr/archives/"
      weight = 3
